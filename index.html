<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Toolbox Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#697386;--brand:#2563eb;--brand2:#0f766e;--danger:#dc2626;--good:#16a34a;--border:#e5e7eb;--shadow:0 10px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(135deg,#1d4ed8,#0f766e);color:white;padding:28px 18px 34px} .wrap{max-width:1120px;margin:0 auto} h1{margin:0;font-size:28px}.sub{margin-top:8px;opacity:.9;line-height:1.5}
    main{max-width:1120px;margin:-22px auto 40px;padding:0 14px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
    label{display:block;font-weight:700;margin:10px 0 7px} input,select,button{font:inherit} input,select{width:100%;padding:12px 12px;border:1px solid #cfd6e4;border-radius:12px;background:white} button{border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer} .primary{background:var(--brand);color:white}.ghost{background:#eef2ff;color:#1e40af}.row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:end}@media(max-width:820px){.row{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.charts{grid-template-columns:1fr}}
    .hint{color:var(--muted);font-size:13px;line-height:1.45}.status{padding:12px;border-radius:12px;margin-top:12px;background:#f8fafc;border:1px dashed #cbd5e1;white-space:pre-line}.err{color:var(--danger)}.ok{color:var(--good)}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:15px}.kpi .t{font-size:13px;color:var(--muted);font-weight:700}.kpi .v{font-size:23px;font-weight:900;margin-top:7px}.pos{color:var(--good)}.neg{color:var(--danger)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar>*{width:auto}.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}.chartbox{height:330px}.mapGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}@media(max-width:820px){.mapGrid{grid-template-columns:1fr}}
    table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden} th,td{padding:11px;border-bottom:1px solid var(--border);text-align:left;font-size:14px} th{background:#f1f5f9;color:#334155}.right{text-align:right}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#e0f2fe;color:#075985;font-size:12px;font-weight:800}.hidden{display:none!important}
  </style>
</head>
<body>
<header><div class="wrap"><h1>💰 Financial Toolbox Pro</h1><div class="sub">구글시트 가계부를 불러와 월별 수입·지출·카테고리·결제수단을 자동 요약합니다.</div></div></header>
<main>
  <section class="card">
    <div class="row">
      <div><label>구글시트 URL</label><input id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../edit" /></div>
      <div><label>시트 GID</label><input id="gid" value="0" placeholder="0" /></div>
      <div><label>기준 월</label><input id="month" type="month" /></div>
      <button class="primary" onclick="loadSheet()">불러오기</button>
    </div>
    <p class="hint">구글시트 공유 권한은 <b>링크가 있는 모든 사용자 - 보기 가능</b>이어야 합니다. 시트가 여러 개면 해당 탭 URL의 <b>gid=숫자</b>를 입력하세요.</p>
    <div id="status" class="status">대기 중입니다.</div>
  </section>

  <section id="mappingCard" class="card hidden">
    <h3>열 이름 매칭 확인</h3>
    <p class="hint">자동 인식이 어려운 경우 아래에서 직접 선택한 뒤 “이 설정으로 분석”을 누르세요.</p>
    <div class="mapGrid" id="mappingGrid"></div>
    <div style="margin-top:12px"><button class="primary" onclick="applyMappingAndRender()">이 설정으로 분석</button></div>
  </section>

  <section id="dashboard" class="hidden">
    <div class="card toolbar">
      <select id="monthSelect" onchange="renderDashboard()"></select>
      <button class="ghost" onclick="resetAll()">초기화</button>
      <span class="hint" id="rowInfo"></span>
    </div>

    <div class="card kpis">
      <div class="kpi"><div class="t">총 수입</div><div class="v pos" id="income">0원</div></div>
      <div class="kpi"><div class="t">총 지출</div><div class="v neg" id="expense">0원</div></div>
      <div class="kpi"><div class="t">잔액</div><div class="v" id="balance">0원</div></div>
      <div class="kpi"><div class="t">저축률</div><div class="v" id="saveRate">0%</div></div>
    </div>

    <div class="charts">
      <div class="card"><h3>카테고리별 지출</h3><div class="chartbox"><canvas id="categoryChart"></canvas></div></div>
      <div class="card"><h3>일자별 지출 추이</h3><div class="chartbox"><canvas id="dailyChart"></canvas></div></div>
    </div>
    <div class="charts">
      <div class="card"><h3>결제수단별 지출</h3><table id="paymentTable"></table></div>
      <div class="card"><h3>지출 TOP 10</h3><table id="topTable"></table></div>
    </div>
  </section>
</main>
<script>
const $=id=>document.getElementById(id); let rawRows=[], headers=[], rows=[], mapping={}, charts=[];
const aliases={
  date:['날짜','일자','사용일','거래일','결제일','작성일','date','day'],
  amount:['금액','사용금액','지출금액','수입금액','거래금액','금액(원)','합계','amount','price','cost'],
  type:['구분','수입지출','입출금','분류','type','income/expense'],
  category:['카테고리','항목','분류','대분류','소분류','category'],
  memo:['내용','내역','사용처','상세','메모','비고','적요','memo','description'],
  payment:['결제수단','카드','계좌','수단','결제','payment','method']
};
const saved=JSON.parse(localStorage.getItem('ftpSettings')||'{}');
$('sheetUrl').value=saved.url||'https://docs.google.com/spreadsheets/d/10Sh1km1Ts4uyHLvjTSjydkLCOy3rLEJkdQOmw2s_i1I/edit?usp=drivesdk'; $('gid').value=saved.gid||'0'; $('month').value=new Date().toISOString().slice(0,7);
function setStatus(msg,cls=''){ $('status').className='status '+cls; $('status').textContent=msg; }
function extractId(url){let m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/); return m?m[1]:url.trim();}
function extractGid(url){let m=url.match(/[?&#]gid=(\d+)/); return m?m[1]:$('gid').value||'0';}
function csvUrl(){const url=$('sheetUrl').value.trim(), id=extractId(url), gid=extractGid(url); $('gid').value=gid; return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;}
function parseCSV(text){const out=[];let row=[],cell='',q=false; for(let i=0;i<text.length;i++){let c=text[i],n=text[i+1]; if(c==='"'){ if(q&&n==='"'){cell+='"';i++;} else q=!q; } else if(c===','&&!q){row.push(cell);cell='';} else if((c==='\n'||c==='\r')&&!q){ if(c==='\r'&&n==='\n')i++; row.push(cell); if(row.some(x=>String(x).trim()!=='')) out.push(row); row=[];cell=''; } else cell+=c;} row.push(cell); if(row.some(x=>String(x).trim()!=='')) out.push(row); return out;}
function norm(s){return String(s||'').toLowerCase().replace(/[\s_\-()（）\[\]{}]/g,'').trim();}
function autoMap(){let m={}; const nh=headers.map(norm); for(const key in aliases){let hit=-1; for(const a of aliases[key]){hit=nh.findIndex(h=>h.includes(norm(a))||norm(a).includes(h)); if(hit>=0)break;} m[key]=hit>=0?headers[hit]:'';} return m;}
function makeMapping(){mapping=autoMap(); $('mappingGrid').innerHTML=''; const labels={date:'날짜(필수)',amount:'금액(필수)',type:'수입/지출 구분',category:'카테고리',memo:'내용/메모',payment:'결제수단'}; Object.keys(labels).forEach(k=>{const div=document.createElement('div'); div.innerHTML=`<label>${labels[k]}</label><select id="map_${k}"><option value="">선택 안 함</option>${headers.map(h=>`<option ${mapping[k]===h?'selected':''}>${h}</option>`).join('')}</select>`; $('mappingGrid').appendChild(div);}); $('mappingCard').classList.remove('hidden');}
async function loadSheet(){try{setStatus('구글시트를 불러오는 중입니다...'); const url=csvUrl(); localStorage.setItem('ftpSettings',JSON.stringify({url:$('sheetUrl').value,gid:$('gid').value})); const res=await fetch(url); if(!res.ok) throw new Error('CSV 다운로드 실패: 공유 권한 또는 gid를 확인하세요.'); const text=await res.text(); rawRows=parseCSV(text); if(rawRows.length<2) throw new Error('데이터가 거의 없습니다. 시트 탭 또는 공유 권한을 확인하세요.'); headers=rawRows[0].map(h=>String(h).trim()||'빈열'); rawRows=rawRows.slice(1); makeMapping(); setStatus(`불러오기 성공: 열 ${headers.length}개, 행 ${rawRows.length}개\n자동 매칭을 확인하고 분석하세요.`, 'ok'); if(mapping.date&&mapping.amount) applyMappingAndRender();}catch(e){setStatus('오류: '+e.message+'\n\n확인사항: 구글시트 공유를 링크 보기 가능으로 변경, gid 확인, 파일명이 아니라 시트 탭을 확인하세요.','err');}}
function parseAmount(v){let s=String(v||'').trim(); if(!s) return 0; let neg=/^-|\(|출금|지출/.test(s); s=s.replace(/[^0-9.\-]/g,''); let n=parseFloat(s); if(isNaN(n)) return 0; return neg?-Math.abs(n):n;}
function parseDate(v){let s=String(v||'').trim(); if(!s)return null; s=s.replace(/[.]/g,'-').replace(/년|월/g,'-').replace(/일/g,'').replace(/\s+/g,' '); let d=new Date(s); if(!isNaN(d))return d; let m=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/); if(m)return new Date(+m[1],+m[2]-1,+m[3]); return null;}
function applyMappingAndRender(){mapping={}; ['date','amount','type','category','memo','payment'].forEach(k=>mapping[k]=$('map_'+k).value); if(!mapping.date||!mapping.amount){setStatus('날짜와 금액 열은 필수입니다. 위에서 직접 선택해 주세요.','err');return;} const idx=h=>headers.indexOf(h); rows=rawRows.map(r=>{let d=parseDate(r[idx(mapping.date)]), amt=parseAmount(r[idx(mapping.amount)]); let type=mapping.type?r[idx(mapping.type)]:''; let isIncome=/수입|입금|급여|월급|income/i.test(type); let isExpense=/지출|출금|사용|expense/i.test(type); if(!isIncome&&!isExpense) isExpense=amt<0; if(!isIncome&&!isExpense) isExpense=true; return {date:d, amount:Math.abs(amt), signed:isIncome?Math.abs(amt):-Math.abs(amt), type:isIncome?'수입':'지출', category:mapping.category?(r[idx(mapping.category)]||'미분류'):'미분류', memo:mapping.memo?(r[idx(mapping.memo)]||''):'', payment:mapping.payment?(r[idx(mapping.payment)]||'미지정'):'미지정'};}).filter(x=>x.date&&x.amount);
 if(!rows.length){setStatus('분석 가능한 날짜/금액 데이터가 없습니다. 열 선택을 다시 확인하세요.','err');return;} const months=[...new Set(rows.map(r=>r.date.toISOString().slice(0,7)))].sort().reverse(); $('monthSelect').innerHTML=months.map(m=>`<option>${m}</option>`).join(''); if($('month').value&&months.includes($('month').value)) $('monthSelect').value=$('month').value; $('dashboard').classList.remove('hidden'); setStatus(`분석 완료: ${rows.length}건을 인식했습니다.`, 'ok'); renderDashboard();}
function won(n){return Math.round(n).toLocaleString('ko-KR')+'원';}
function group(list,key){return list.reduce((a,r)=>{let k=typeof key==='function'?key(r):r[key]; a[k]=(a[k]||0)+r.amount; return a;},{});} 
function renderDashboard(){charts.forEach(c=>c.destroy()); charts=[]; const m=$('monthSelect').value; const list=rows.filter(r=>r.date.toISOString().slice(0,7)===m); const inc=list.filter(r=>r.type==='수입').reduce((a,r)=>a+r.amount,0); const exp=list.filter(r=>r.type==='지출').reduce((a,r)=>a+r.amount,0); $('income').textContent=won(inc); $('expense').textContent=won(exp); $('balance').textContent=won(inc-exp); $('balance').className='v '+(inc-exp>=0?'pos':'neg'); $('saveRate').textContent=inc?Math.round((inc-exp)/inc*100)+'%':'-'; $('rowInfo').textContent=`${m} 기준 ${list.length}건`;
 const exps=list.filter(r=>r.type==='지출'); const cat=group(exps,'category'), pay=group(exps,'payment'), daily=group(exps,r=>String(r.date.getDate()).padStart(2,'0')+'일');
 charts.push(new Chart($('categoryChart'),{type:'doughnut',data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}}));
 charts.push(new Chart($('dailyChart'),{type:'line',data:{labels:Object.keys(daily).sort(),datasets:[{label:'지출',data:Object.keys(daily).sort().map(k=>daily[k]),tension:.25}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v.toLocaleString()}}}}}));
 fillTable('paymentTable',['결제수단','금액'],Object.entries(pay).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,won(v)]));
 fillTable('topTable',['날짜','카테고리','내용','금액'],exps.sort((a,b)=>b.amount-a.amount).slice(0,10).map(r=>[r.date.toISOString().slice(0,10),`<span class="pill">${r.category}</span>`,r.memo,won(r.amount)]));}
function fillTable(id,heads,data){$(id).innerHTML='<thead><tr>'+heads.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'+data.map(r=>'<tr>'+r.map((c,i)=>`<td class="${i===r.length-1?'right':''}">${c}</td>`).join('')+'</tr>').join('')+'</tbody>';}
function resetAll(){localStorage.removeItem('ftpSettings'); location.reload();}
</script>
</body>
</html>
